<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alfred — Assinar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0A0A0A;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 440px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .avatar-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid #C8A800;
      padding: 3px;
      margin: 0 auto 16px;
      background: #0A0A0A;
      box-shadow: 0 0 24px rgba(200, 168, 0, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar-ring img {
      width: 180%;
      height: 180%;
      object-fit: cover;
      margin-left: 0%;
      margin-top: 0%;
      margin-right: 0%;
    }

    .nome {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: #F0F0F0;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 12px;
      color: #666;
      letter-spacing: 1px;
    }

    /* ── Card ── */
    .card {
      background: #111;
      border: 1px solid #1E1E1E;
      border-radius: 12px;
      padding: 32px;
    }

    /* ── Planos ── */
    .label-secao {
      font-size: 10px;
      font-weight: 600;
      color: #555;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .planos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }

    .plano {
      border: 1.5px solid #222;
      border-radius: 8px;
      padding: 16px 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      background: #0E0E0E;
      position: relative;
    }

    .plano:hover {
      border-color: #3A3000;
    }

    .plano.selecionado {
      border-color: #C8A800;
      background: #12100A;
    }

    .plano.selecionado::after {
      content: "✓";
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 11px;
      color: #C8A800;
    }

    .plano-nome {
      font-size: 11px;
      font-weight: 500;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .plano-preco {
      font-size: 22px;
      font-weight: 600;
      color: #F0F0F0;
      line-height: 1;
    }

    .plano-preco .centavos {
      font-size: 13px;
      font-weight: 400;
      color: #555;
    }

    .plano-desc {
      font-size: 10px;
      color: #444;
      margin-top: 4px;
    }

    /* ── Input ── */
    .campo {
      margin-bottom: 24px;
    }

    .campo label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: #555;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .campo input {
      width: 100%;
      background: #0E0E0E;
      border: 1.5px solid #1E1E1E;
      border-radius: 7px;
      padding: 13px 16px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: #F0F0F0;
      outline: none;
      transition: border-color 0.2s;
    }

    .campo input:focus {
      border-color: #C8A800;
    }

    .campo input::placeholder {
      color: #333;
    }

    .erro {
      font-size: 11px;
      color: #E53935;
      margin-top: 6px;
      display: none;
    }

    /* ── Botão ── */
    .btn {
      width: 100%;
      background: #C8A800;
      color: #0A0A0A;
      border: none;
      border-radius: 7px;
      padding: 15px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
    }

    .btn:hover { background: #D4B200; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; background: #C8A800; }

    /* ── Rodapé ── */
    .rodape {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #333;
      line-height: 1.8;
    }

    .rodape a {
      color: #444;
      text-decoration: none;
      transition: color 0.2s;
    }

    .rodape a:hover { color: #C8A800; }

    .seguro {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 10px;
      color: #2E2E2E;
    }

    .seguro svg {
      opacity: 0.4;
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <div class="avatar-ring">
      <img src="alfred-avatar.png" alt="Alfred">
    </div>
    <div class="nome">ALFRED</div>
    <div class="tagline">Seu mordomo financeiro</div>
  </div>

  <div class="card">

    <div class="label-secao">Escolha seu plano</div>

    <div class="planos">
      <div class="plano selecionado" id="plano-individual" onclick="selecionarPlano('individual')">
        <div class="plano-nome">Individual</div>
        <div class="plano-preco">R$ 29<span class="centavos">,90/mês</span></div>
        <div class="plano-desc">Para você</div>
      </div>
      <div class="plano" id="plano-casal" onclick="selecionarPlano('casal')">
        <div class="plano-nome">Casal</div>
        <div class="plano-preco">R$ 44<span class="centavos">,90/mês</span></div>
        <div class="plano-desc">Para dois</div>
      </div>
    </div>

    <div class="campo">
      <label>Seu número de WhatsApp</label>
      <input
        type="tel"
        id="numero"
        placeholder="(11) 99999-9999"
        maxlength="15"
        oninput="formatarNumero(this)"
      >
      <div class="erro" id="erro">Informe um número válido com DDD.</div>
    </div>

    <button class="btn" id="btn-assinar" onclick="assinar()">
      Continuar para pagamento
    </button>

  </div>

  <div class="rodape">
    <a href="https://alfredfin.com.br">← Voltar ao site</a>
    <div class="seguro">
      <svg width="10" height="12" viewBox="0 0 10 12" fill="none">
        <rect x="1" y="5" width="8" height="7" rx="1.5" stroke="#888" stroke-width="1.2"/>
        <path d="M3 5V3.5a2 2 0 0 1 4 0V5" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Pagamento seguro via Stripe
    </div>
  </div>

</div>

<script>
  const PRICE_IDS = {
    individual: "price_1TEqAvQjOVl4Rkspx9u5VQSY",
    casal:      "price_1TEqD4QjOVl4RkspzF6umOeU",
  };

  const BACKEND_URL = "https://alfred-financebot-production.up.railway.app";

  let planoSelecionado = "individual";

  function selecionarPlano(plano) {
    planoSelecionado = plano;
    document.getElementById("plano-individual").classList.toggle("selecionado", plano === "individual");
    document.getElementById("plano-casal").classList.toggle("selecionado", plano === "casal");
  }

  function formatarNumero(input) {
    let v = input.value.replace(/\D/g, "");
    if (v.length > 11) v = v.slice(0, 11);
    if (v.length > 7)      v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
    else if (v.length > 2) v = `(${v.slice(0,2)}) ${v.slice(2)}`;
    else if (v.length > 0) v = `(${v}`;
    input.value = v;
  }

  async function assinar() {
    const input = document.getElementById("numero");
    const erro  = document.getElementById("erro");
    const btn   = document.getElementById("btn-assinar");

    const numeros = input.value.replace(/\D/g, "");
    if (numeros.length < 10 || numeros.length > 11) {
      erro.style.display = "block";
      return;
    }
    erro.style.display = "none";
    btn.disabled = true;
    btn.textContent = "Aguarde...";

    try {
      const resp = await fetch(`${BACKEND_URL}/criar-checkout`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          price_id: PRICE_IDS[planoSelecionado],
          numero_whatsapp: `55${numeros}`,
          plano: planoSelecionado,
        }),
      });

      const data = await resp.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        throw new Error("URL não retornada");
      }
    } catch (e) {
      btn.disabled = false;
      btn.textContent = "Continuar para pagamento";
      alert("Erro ao processar. Tente novamente.");
    }
  }

  // Pré-seleciona plano via query string (?plano=casal)
  const params = new URLSearchParams(window.location.search);
  const planoParam = params.get("plano");
  if (planoParam === "casal") selecionarPlano("casal");
</script>

</body>
</html>
